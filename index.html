<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NY Cricket Live — Channels</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface:#0a0a0a; --border:#1a1a1a; --border2:#222;
      --accent:#e8c547; --green:#22c55e; --red:#ef4444; --text:#f0f0f0;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* HEADER */
    header{
      position:sticky;top:0;z-index:100;height:64px;padding:0 32px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(0,0,0,0.97);border-bottom:1px solid var(--border);
      backdrop-filter:blur(16px);
    }
    .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-img{
      height:46px;width:auto;object-fit:contain;
      filter:drop-shadow(0 0 12px rgba(232,197,71,0.45));transition:filter .3s;
    }
    .logo-img:hover{filter:drop-shadow(0 0 22px rgba(232,197,71,0.75));}
    .logo-words{display:flex;flex-direction:column;line-height:1.1;}
    .logo-top{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--accent);}
    .logo-bot{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:5px;color:#444;}
    .hdr-right{display:flex;align-items:center;gap:10px;}
    .pill{
      display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;
      font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    }
    .pill-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.28);color:#ff6b6b;}
    .pill-gold{background:rgba(232,197,71,0.08);border:1px solid rgba(232,197,71,0.22);color:var(--accent);}
    .live-dot{
      width:6px;height:6px;border-radius:50%;background:#ef4444;
      box-shadow:0 0 6px #ef4444;animation:blink 1.3s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

    /* MAIN */
    .main-wrap{max-width:1400px;margin:0 auto;padding:24px;}
    .controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:220px;}
    .search-wrap input{
      width:100%;background:#0a0a0a;border:1px solid var(--border2);border-radius:8px;
      padding:10px 12px 10px 36px;color:var(--text);font-family:'Outfit',sans-serif;
      font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .search-wrap input::placeholder{color:#333;}
    .search-wrap input:focus{
      border-color:rgba(232,197,71,0.4);
      box-shadow:0 0 0 3px rgba(232,197,71,0.06);
    }
    .search-ico{
      position:absolute;left:11px;top:50%;transform:translateY(-50%);
      font-size:13px;color:#333;pointer-events:none;
    }

    .cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;}
    .cat-btn{
      padding:5px 12px;border-radius:20px;border:1px solid var(--border2);
      background:transparent;color:#555;font-size:11px;font-weight:600;
      cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;
    }
    .cat-btn:hover{color:#aaa;border-color:#333;}
    .cat-btn.active{
      background:rgba(232,197,71,0.1);
      border-color:rgba(232,197,71,0.35);
      color:var(--accent);
    }

    .ch-count-row{
      font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      color:#333;margin-bottom:14px;
    }

    .ch-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:10px;
    }

    .ch-card{
      display:block;text-decoration:none;color:var(--text);
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      overflow:hidden;transition:all .2s;cursor:pointer;
    }
    .ch-card:hover{
      border-color:rgba(232,197,71,0.3);background:#0f0f0f;
      transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    .ch-card-top{
      aspect-ratio:16/9;background:#050505;display:flex;align-items:center;
      justify-content:center;position:relative;overflow:hidden;
    }
    .ch-card-top img{width:100%;height:100%;object-fit:contain;padding:12px;}
    .ch-card-top .ch-ph-big{font-size:40px;}
    .ch-live-tag{
      position:absolute;top:8px;left:8px;font-size:8px;font-weight:700;
      letter-spacing:1px;color:#ff6b6b;background:rgba(0,0,0,0.8);
      border:1px solid rgba(239,68,68,0.3);padding:2px 7px;border-radius:4px;
    }
    .ch-num-tag{
      position:absolute;top:8px;right:8px;font-family:'Bebas Neue',sans-serif;
      font-size:13px;color:#333;background:rgba(0,0,0,0.7);
      padding:1px 6px;border-radius:4px;
    }
    .ch-card-body{padding:10px 12px 12px;}
    .ch-card-name{
      font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;margin-bottom:3px;
    }
    .ch-card-cat{
      font-size:10px;color:#444;font-weight:500;text-transform:uppercase;letter-spacing:.5px;
    }

    .skel{
      background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);
      background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;
    }
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    .skel-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .skel-card-top{aspect-ratio:16/9;background:#0a0a0a;}
    .skel-card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;}
    .skel-line{height:10px;border-radius:4px;}
    .skel-line.w80{width:80%;}
    .skel-line.w50{width:50%;}

    #loading-screen{
      position:fixed;inset:0;background:#000;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    }
    .load-logo{
      height:70px;filter:drop-shadow(0 0 22px rgba(232,197,71,0.5));
      animation:glow 2s ease-in-out infinite;
    }
    @keyframes glow{
      0%,100%{filter:drop-shadow(0 0 14px rgba(232,197,71,0.4));}
      50%{filter:drop-shadow(0 0 34px rgba(232,197,71,0.8));}
    }
    .load-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;color:var(--accent);}
    .load-bar{width:200px;height:2px;background:#111;border-radius:2px;overflow:hidden;}
    .load-fill{height:100%;background:var(--accent);border-radius:2px;animation:loadFill 1.8s ease-in-out infinite;}
    @keyframes loadFill{0%{width:0;}70%{width:90%;}100%{width:100%;}}
    .load-sub{font-size:12px;color:#333;letter-spacing:1px;}

    #toasts{
      position:fixed;bottom:22px;right:22px;z-index:9000;
      display:flex;flex-direction:column;gap:8px;pointer-events:none;
    }
    .toast{
      background:#161616;border-radius:8px;padding:10px 15px;font-size:13px;
      display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;
      box-shadow:0 8px 32px rgba(0,0,0,0.8);border-left:3px solid var(--accent);max-width:280px;
    }
    .toast.t-ok{border-left-color:var(--green);}
    .toast.t-err{border-left-color:var(--red);}
    @keyframes toastIn{from{opacity:0;transform:translateX(22px);}to{opacity:1;transform:translateX(0);}}

    .err-state{padding:60px 16px;text-align:center;color:#333;grid-column:1/-1;}
    .err-state p{font-size:13px;margin-bottom:12px;}
    .err-state button{
      padding:8px 18px;background:rgba(232,197,71,0.1);border:1px solid rgba(232,197,71,0.25);
      border-radius:7px;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;
      font-family:'Outfit',sans-serif;
    }

    @media(max-width:600px){
      header{padding:0 16px;}
      .logo-words{display:none;}
      .main-wrap{padding:16px;}
      .ch-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <img class="load-logo" src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="NY Cricket Live">
    <div class="load-text">NY CRICKET LIVE</div>
    <div class="load-bar"><div class="load-fill"></div></div>
    <div class="load-sub">Loading channels…</div>
  </div>

  <header>
    <a class="logo" href="index.html">
      <img src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="NY Cricket Live" class="logo-img">
      <div class="logo-words">
        <div class="logo-top">NY CRICKET</div>
        <div class="logo-bot">LIVE STREAMING</div>
      </div>
    </a>
    <div class="hdr-right">
      <div class="pill pill-red"><div class="live-dot"></div>LIVE</div>
      <div class="pill pill-gold" id="ch-count-pill">0 CHANNELS</div>
    </div>
  </header>

  <div class="main-wrap">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-inp" placeholder="Search channels…" oninput="filterChannels()">
      </div>
    </div>

    <div class="cat-row" id="cat-tabs">
      <button class="cat-btn active" data-cat="All" onclick="selectCat(this)">All</button>
    </div>

    <div class="ch-count-row" id="ch-count-label">Loading…</div>
    <div class="ch-grid" id="ch-grid"></div>
  </div>

  <div id="toasts"></div>

  <script>
    const JSON_URL = 'https://raw.githubusercontent.com/nischayydv/jiooutputwithplayer/main/output.json';
    let allChannels = [];
    let filtered = [];
    let currentCat = 'All';

    const catEmoji = {
      'Cricket':'🏏',
      'Sports':'⚽',
      'Business News':'📈',
      'Entertainment':'🎬',
      'News':'📰',
      'Infotainment':'🔬',
      'Movies':'🎥',
      'Kids':'🧸',
      'Music':'🎵',
      'Devotional':'🙏',
      'Regional':'🗺️',
      'Lifestyle':'✨'
    };

    function getCE(c) {
      return catEmoji[c] || '📺';
    }

    function showSkeletons() {
      const grid = document.getElementById('ch-grid');
      grid.innerHTML = Array(16).fill('').map(() => `
        <div class="skel-card">
          <div class="skel skel-card-top"></div>
          <div class="skel-card-body">
            <div class="skel skel-line w80"></div>
            <div class="skel skel-line w50"></div>
          </div>
        </div>
      `).join('');
    }

    async function loadChannels() {
      showSkeletons();

      try {
        const res = await fetch(JSON_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Invalid JSON format');

        allChannels = data.map(ch => ({
          id: String(ch.id || ''),
          name: String(ch.name || 'Unknown Channel'),
          logo: String(ch.logo || ''),
          group: String(ch.group || 'General')
        }));

        buildCats();
        filterChannels();

        document.getElementById('ch-count-pill').textContent = allChannels.length + ' CHANNELS';
        hideLoading();
        toast('✦ ' + allChannels.length + ' channels loaded', 'ok');
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('ch-grid').innerHTML = `
          <div class="err-state">
            <p>Failed to load channels</p>
            <button onclick="loadChannels()">↺ Retry</button>
          </div>
        `;
        document.getElementById('ch-count-label').textContent = '0 CHANNELS';
        document.getElementById('ch-count-pill').textContent = '0 CHANNELS';
        hideLoading();
        toast('Failed to load channels', 'err');
      }
    }

    function hideLoading() {
      const el = document.getElementById('loading-screen');
      if (!el) return;
      el.style.transition = 'opacity 0.5s ease';
      el.style.opacity = '0';
      setTimeout(() => {
        if (el.parentNode) el.remove();
      }, 500);
    }

    function buildCats() {
      const cats = ['All', ...new Set(allChannels.map(c => c.group).filter(Boolean))]
        .sort((a, b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));

      document.getElementById('cat-tabs').innerHTML = cats.map(c => `
        <button class="cat-btn${c === 'All' ? ' active' : ''}" data-cat="${escapeAttr(c)}" onclick="selectCat(this)">
          ${getCE(c)} ${escapeHtml(c)}
        </button>
      `).join('');
    }

    function selectCat(btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      filterChannels();
    }

    function filterChannels() {
      const q = document.getElementById('search-inp').value.toLowerCase().trim();

      filtered = allChannels.filter(ch =>
        (currentCat === 'All' || ch.group === currentCat) &&
        (
          !q ||
          ch.name.toLowerCase().includes(q) ||
          ch.group.toLowerCase().includes(q) ||
          ch.id.toLowerCase().includes(q)
        )
           );

      document.getElementById('ch-count-label').textContent = filtered.length + ' CHANNELS';
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('ch-grid');

      if (!filtered.length) {
        grid.innerHTML = '<div class="err-state"><p>No channels found</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(ch => `
        <a class="ch-card" href="channel.html?id=${encodeURIComponent(ch.id)}">
          <div class="ch-card-top">
            ${
              ch.logo
              ? `<img src="${escapeAttr(ch.logo)}" alt="${escapeAttr(ch.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="ch-ph-big" style="display:none">${getCE(ch.group)}</span>`
              : `<span class="ch-ph-big">${getCE(ch.group)}</span>`
            }
            <span class="ch-live-tag">● LIVE</span>
            <span class="ch-num-tag">${escapeHtml(ch.id)}</span>
          </div>
          <div class="ch-card-body">
            <div class="ch-card-name">${escapeHtml(ch.name)}</div>
            <div class="ch-card-cat">${escapeHtml(ch.group)}</div>
          </div>
        </a>
      `).join('');
    }

    function toast(msg, type = 'info') {
      const c = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = `toast${type === 'ok' ? ' t-ok' : type === 'err' ? ' t-err' : ''}`;
      t.textContent = msg;
      c.appendChild(t);

      setTimeout(() => {
        if (t.parentNode) t.remove();
      }, 3000);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[m]));
    }

    function escapeAttr(str) {
      return String(str).replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[m]));
    }

    loadChannels();
  </script>
<script>
  /* ── Anti-DevTools Protection ── */

  // 1. Block right-click
  document.addEventListener('contextmenu', e => e.preventDefault());

  // 2. Block keyboard shortcuts
  document.addEventListener('keydown', e => {
    // F12
    if (e.key === 'F12') { e.preventDefault(); return false; }
    // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) {
      e.preventDefault(); return false;
    }
    // Ctrl+U (view source)
    if (e.ctrlKey && ['U','u'].includes(e.key)) {
      e.preventDefault(); return false;
    }
    // Ctrl+S (save page)
    if (e.ctrlKey && ['S','s'].includes(e.key)) {
      e.preventDefault(); return false;
    }
  });

  // 3. Debugger loop — makes the JS debugger unusable
  (function devtoolsDebuggerLoop() {
    function loop() {
      (function() {})['constructor']('debugger')();
    }
    try { loop(); } catch(e) {}
    requestAnimationFrame(devtoolsDebuggerLoop);
  })();

  // 4. DevTools size detection — redirect if devtools detected
  (function detectDevtools() {
    const threshold = 160;
    function check() {
      const widthDiff  = window.outerWidth  - window.innerWidth;
      const heightDiff = window.outerHeight - window.innerHeight;
      if (widthDiff > threshold || heightDiff > threshold) {
        // Devtools likely open — redirect to blank or close
        document.body.innerHTML = '';
        document.title = 'Access Denied';
        window.location.replace('about:blank');
      }
    }
    setInterval(check, 1000);
    window.addEventListener('resize', check);
  })();

  // 5. Console warning + periodic clear
  (function consoleGuard() {
    const msg = '%c⛔ Unauthorized access is not permitted.';
    const style = 'color: red; font-size: 18px; font-weight: bold;';
    setInterval(() => {
      console.clear();
      console.log(msg, style);
    }, 1500);
  })();

  // 6. Disable text selection (optional — helps prevent copy-paste of source snippets)
  document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
