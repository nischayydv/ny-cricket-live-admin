<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NY Cricket Live — Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
<style>
:root {
  --bg: #000;
  --surface: #0a0a0a;
  --card: #111;
  --border: #1a1a1a;
  --border2: #222;
  --accent: #e8c547;
  --green: #22c55e;
  --red: #ef4444;
  --text: #f0f0f0;
  --muted: #444;
  --muted2: #888;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  height: 64px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
}
.logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.logo-img {
  height: 46px; width: auto; object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(232,197,71,0.45));
  transition: filter 0.3s;
}
.logo-img:hover { filter: drop-shadow(0 0 22px rgba(232,197,71,0.75)); }
.logo-words { display: flex; flex-direction: column; line-height: 1.1; }
.logo-top { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; color: var(--accent); }
.logo-bot { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 5px; color: #444; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 100px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
}
.pill-red { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.28); color: #ff6b6b; }
.pill-gold { background: rgba(232,197,71,0.08); border: 1px solid rgba(232,197,71,0.22); color: var(--accent); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: blink 1.3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 64px); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: calc(100vh - 64px);
  position: sticky; top: 64px;
  overflow: hidden;
}
.sidebar-top { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: #0a0a0a; border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 12px 10px 36px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input::placeholder { color: #333; }
.search-wrap input:focus { border-color: rgba(232,197,71,0.4); box-shadow: 0 0 0 3px rgba(232,197,71,0.07); }
.search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #333; pointer-events: none; }

.cat-tabs { display: flex; gap: 4px; padding: 12px 16px 0; flex-shrink: 0; flex-wrap: wrap; }
.cat-btn {
  padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; color: #555; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.18s; font-family: 'Outfit', sans-serif;
  letter-spacing: 0.3px;
}
.cat-btn:hover { color: #aaa; border-color: #333; }
.cat-btn.active { background: rgba(232,197,71,0.1); border-color: rgba(232,197,71,0.35); color: var(--accent); }

.ch-count { padding: 10px 16px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #333; flex-shrink: 0; }

.ch-list { flex: 1; overflow-y: auto; padding: 6px 10px 10px; }
.ch-list::-webkit-scrollbar { width: 4px; }
.ch-list::-webkit-scrollbar-track { background: transparent; }
.ch-list::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 4px; }
.ch-list::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }

.ch-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 10px; border-radius: 10px;
  cursor: pointer; transition: all 0.18s;
  border: 1px solid transparent; margin-bottom: 3px;
}
.ch-item:hover { background: rgba(255,255,255,0.04); border-color: #1a1a1a; }
.ch-item.active { background: rgba(232,197,71,0.07); border-color: rgba(232,197,71,0.2); }
.ch-logo-wrap {
  width: 44px; height: 44px; border-radius: 8px; overflow: hidden;
  background: #0a0a0a; border: 1px solid #1a1a1a; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.ch-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.ch-logo-wrap .ch-placeholder { font-size: 18px; }
.ch-info { flex: 1; min-width: 0; }
.ch-name-s { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.ch-cat-s { font-size: 10px; color: #444; font-weight: 500; letter-spacing: 0.5px; }
.ch-live-badge { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: #ff6b6b; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }

/* Skeleton */
.skel-item { display: flex; align-items: center; gap: 11px; padding: 10px; margin-bottom: 3px; }
.skel { background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
.skel-logo { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; }
.skel-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.skel-line { height: 11px; border-radius: 4px; }
.skel-line.w80 { width: 80%; }
.skel-line.w50 { width: 50%; }

/* ── PLAYER AREA ── */
.player-area { display: flex; flex-direction: column; }

/* No selection state */
.no-sel {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: #333; padding: 40px;
}
.no-sel-ico {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(232,197,71,0.05); border: 1px solid rgba(232,197,71,0.1);
  display: flex; align-items: center; justify-content: center; font-size: 34px;
}
.no-sel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: #333; }
.no-sel p { font-size: 13px; color: #2a2a2a; text-align: center; max-width: 280px; }

/* Player wrapper */
.player-wrapper { flex: 1; display: flex; flex-direction: column; }
.player-top {
  padding: 14px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
.now-playing-logo {
  width: 40px; height: 40px; border-radius: 7px; overflow: hidden;
  background: #0a0a0a; border: 1px solid #1a1a1a; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.now-playing-logo img { width: 100%; height: 100%; object-fit: cover; }
.now-playing-info { flex: 1; }
.now-playing-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; line-height: 1; margin-bottom: 3px; }
.now-playing-cat { font-size: 11px; color: #555; }

.shaka-video-container {
  position: relative;
  width: 100%;
  background: #000;
  aspect-ratio: 16/9;
  max-height: calc(100vh - 64px - 70px);
}
video { width: 100%; height: 100%; background: #000; object-fit: contain; display: block; }

/* YouTube Theme */
.youtube-theme .shaka-bottom-controls { width: 100%; padding: 0; z-index: 1; display: flex; flex-direction: column; }
.youtube-theme .shaka-controls-button-panel { height: 40px; padding: 0 10px; }
.youtube-theme .shaka-range-container { margin: 4px 10px; top: 0; }
.youtube-theme .shaka-small-play-button { order: -3; }
.youtube-theme .shaka-mute-button { order: -2; }
.youtube-theme .shaka-controls-button-panel > * { margin: 0; padding: 3px 8px; color: #EEE; height: 40px; }
.youtube-theme .shaka-controls-button-panel > *:focus { outline: none; }
.youtube-theme .shaka-current-time { padding: 0 10px; font-size: 12px; }
.youtube-theme .shaka-seek-bar-container { height: 3px; border-radius: 0; }
.youtube-theme .shaka-seek-bar-container:hover { height: 5px; cursor: pointer; }
.youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: #e8c547; cursor: pointer; }
.youtube-theme .shaka-seek-bar-container input[type=range]::-moz-range-thumb { background: #e8c547; cursor: pointer; }
.youtube-theme .shaka-overflow-menu, .youtube-theme .shaka-settings-menu { border-radius: 4px; background: rgba(10,10,10,.95); right: 10px; bottom: 50px; padding: 8px 0; min-width: 200px; }
.youtube-theme .shaka-overflow-menu button, .youtube-theme .shaka-settings-menu button { color: #EEE; }
.youtube-theme .shaka-overflow-menu button:hover, .youtube-theme .shaka-settings-menu button:hover { background: rgba(255,255,255,.08); cursor: pointer; }
.youtube-theme .shaka-seek-bar { background: rgba(255,255,255,.2) !important; }
.youtube-theme .shaka-buffered-range { background: rgba(255,255,255,.4) !important; }
.youtube-theme .shaka-played-range { background: #e8c547 !important; }
.shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; }
.youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label { display: flex; justify-content: space-between; align-items: center; height: 40px; flex: 0 0 100%; }
.youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label span { flex-shrink: initial; padding-left: 15px; font-size: 13px; display: flex; align-items: center; }
.youtube-theme .shaka-overflow-menu button i { display: none; }
.youtube-theme .shaka-overflow-menu span + span { color: #FFF; font-size: 12px !important; padding-right: 8px; padding-left: 0 !important; }
.youtube-theme .shaka-overflow-menu span + span:after { content: "navigate_next"; font-family: 'Material Icons Sharp'; font-size: 20px; }
.youtube-theme .shaka-back-to-overflow-button { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.1); font-size: 12px; height: 40px; }
.youtube-theme .shaka-settings-menu button { font-size: 12px; }
.youtube-theme .shaka-settings-menu button span { margin-left: 33px; font-size: 13px; }
.youtube-theme .shaka-settings-menu button[aria-selected="true"] { display: flex; }
.youtube-theme .shaka-settings-menu button[aria-selected="true"] span { order: 2; margin-left: 0; }
.youtube-theme .shaka-settings-menu button[aria-selected="true"] i { order: 1; font-size: 18px; padding-left: 5px; }

/* Play overlay */
#playOverlay {
  position: absolute; inset: 0; z-index: 3000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  cursor: pointer;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.65));
}
#playOverlay.fade-out { animation: fadeOut 0.4s ease forwards; pointer-events: none; }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
.ring { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#playBtn { display: none; width: 76px; height: 76px; border-radius: 50%; background: rgba(232,197,71,0.92); align-items: center; justify-content: center; box-shadow: 0 0 0 0 rgba(232,197,71,0.45); animation: pulse 2.2s infinite; transition: transform 0.15s; }
#playBtn svg { width: 32px; height: 32px; margin-left: 5px; fill: #000; }
#playBtn:hover { transform: scale(1.1); }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(232,197,71,0.45);} 70%{box-shadow:0 0 0 22px rgba(232,197,71,0);} 100%{box-shadow:0 0 0 0 rgba(232,197,71,0);} }
.overlay-label { color: rgba(255,255,255,0.8); font-size: 13px; letter-spacing: 0.05em; text-shadow: 0 1px 6px rgba(0,0,0,0.9); }

#watermarkLogo {
  position: absolute; left: 10px; top: 10px;
  width: 52px; height: auto; opacity: 0.3; z-index: 1500;
  pointer-events: none; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7));
  transition: opacity 0.3s;
}
.shaka-video-container:hover #watermarkLogo { opacity: 0.5; }

#errorBox {
  display: none; position: absolute; inset: 0; z-index: 5000;
  background: #000; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  color: #ff6666; font-size: 15px; text-align: center; padding: 24px;
}
#errorBox .err-ico { font-size: 40px; }

/* Channel info below player */
.ch-info-bar {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  background: var(--surface);
}
.info-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #222;
  line-height: 1; min-width: 44px;
}
.info-text { flex: 1; }
.info-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--text); line-height: 1; margin-bottom: 3px; }
.info-cat { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.info-grp {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(232,197,71,0.07); border: 1px solid rgba(232,197,71,0.18);
  font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px;
}

/* Loading screen */
#loading-screen {
  position: fixed; inset: 0; background: #000; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.load-logo { height: 72px; filter: drop-shadow(0 0 24px rgba(232,197,71,0.5)); animation: glow 2s ease-in-out infinite; }
@keyframes glow { 0%,100%{filter:drop-shadow(0 0 16px rgba(232,197,71,0.4));} 50%{filter:drop-shadow(0 0 36px rgba(232,197,71,0.8));} }
.load-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 5px; color: var(--accent); }
.load-bar { width: 200px; height: 2px; background: #111; border-radius: 2px; overflow: hidden; }
.load-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: loadFill 1.8s ease-in-out infinite; }
@keyframes loadFill { 0%{width:0%;} 70%{width:90%;} 100%{width:100%;} }
.load-sub { font-size: 12px; color: #333; letter-spacing: 1px; }

/* Toast */
#toasts { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: #161616; border-radius: 8px; padding: 11px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; animation: toastIn 0.25s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.8); border-left: 3px solid var(--accent); max-width: 280px; }
.toast.t-ok { border-left-color: var(--green); }
.toast.t-err { border-left-color: var(--red); }
@keyframes toastIn { from{opacity:0;transform:translateX(24px);} to{opacity:1;transform:translateX(0);} }

/* Error state in sidebar */
.err-state { padding: 40px 16px; text-align: center; color: #333; }
.err-state p { font-size: 13px; margin-bottom: 12px; }
.err-state button { padding: 8px 18px; background: rgba(232,197,71,0.1); border: 1px solid rgba(232,197,71,0.25); border-radius: 7px; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Outfit', sans-serif; }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { height: auto; position: static; max-height: 320px; }
  .player-area { order: -1; }
  .shaka-video-container { aspect-ratio: 16/9; max-height: none; }
  header { padding: 0 16px; }
  .logo-words { display: none; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <img class="load-logo" src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="NY Cricket Live">
  <div class="load-text">NY CRICKET LIVE</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-sub">Loading channels…</div>
</div>

<!-- Header -->
<header>
  <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <img src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="NY Cricket Live" class="logo-img">
    <div class="logo-words">
      <div class="logo-top">NY CRICKET</div>
      <div class="logo-bot">LIVE STREAMING</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="pill pill-red"><div class="live-dot"></div>LIVE</div>
    <div class="pill pill-gold" id="ch-count-pill">0 CHANNELS</div>
  </div>
</header>

<!-- Main Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-inp" placeholder="Search channels…" oninput="filterChannels()">
      </div>
    </div>
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-btn active" data-cat="All" onclick="selectCat(this)">All</button>
    </div>
    <div class="ch-count" id="ch-count-label">Loading…</div>
    <div class="ch-list" id="ch-list">
      <!-- Skeletons -->
      ${Array(8).fill('').map(()=>`
      <div class="skel-item">
        <div class="skel skel-logo"></div>
        <div class="skel-lines">
          <div class="skel skel-line w80"></div>
          <div class="skel skel-line w50"></div>
        </div>
      </div>`).join('')}
    </div>
  </aside>

  <!-- Player Area -->
  <main class="player-area" id="player-area">
    <!-- No selection -->
    <div class="no-sel" id="no-sel">
      <div class="no-sel-ico">📺</div>
      <h2>Select a Channel</h2>
      <p>Choose any channel from the list to start watching live</p>
    </div>

    <!-- Player wrapper (hidden until channel selected) -->
    <div class="player-wrapper" id="player-wrapper" style="display:none;">
      <div class="player-top">
        <div class="now-playing-logo" id="np-logo">📺</div>
        <div class="now-playing-info">
          <div class="now-playing-name" id="np-name">—</div>
          <div class="now-playing-cat" id="np-cat">—</div>
        </div>
        <div class="pill pill-red"><div class="live-dot"></div>LIVE NOW</div>
      </div>

      <!-- Shaka Player -->
      <div class="shaka-video-container youtube-theme" id="shaka-container" data-shaka-player>
        <video id="video-el" playsinline preload="auto"
          poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY">
        </video>

        <!-- Play Overlay -->
        <div id="playOverlay">
          <div class="ring" id="loadRing"></div>
          <div id="playBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <div class="overlay-label" id="overlayLabel">Loading stream…</div>
        </div>

        <img id="watermarkLogo"
          src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="">
        <div id="errorBox"><div class="err-ico">⚠</div><div id="errorMsg">Failed to load stream</div></div>
      </div>

      <div class="ch-info-bar">
        <div class="info-num" id="info-num">—</div>
        <div class="info-text">
          <div class="info-name" id="info-name">—</div>
          <div class="info-cat" id="info-cat">—</div>
        </div>
        <div class="info-grp" id="info-grp">—</div>
      </div>
    </div>
  </main>

</div>

<div id="toasts"></div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/nischayydv/jiojson/main/stream.json';
let allChannels = [];
let filtered = [];
let activeKey = null;
let currentCat = 'All';
let shakaPlayer = null;
let streamReady = false;

const catEmoji = {
  'Cricket':'🏏', 'Sports':'⚽', 'Business News':'📈', 'Entertainment':'🎬',
  'News':'📰', 'Infotainment':'🔬', 'Movies':'🎥', 'Kids':'🧸',
  'Music':'🎵', 'Devotional':'🙏', 'Regional':'🗺️', 'Lifestyle':'✨',
  'Technology':'💻', 'Auto':'🚗', 'Travel':'✈️', 'Comedy':'😄'
};
const getCatEmoji = c => catEmoji[c] || '📺';

// ── Load channels ──
async function loadChannels() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allChannels = Object.entries(data).map(([key, ch]) => ({ key, ...ch }));
    buildCats();
    filterChannels();
    document.getElementById('ch-count-pill').textContent = allChannels.length + ' CHANNELS';
    hideLoading();
    toast('✦ ' + allChannels.length + ' channels loaded', 'ok');
  } catch(e) {
    console.error(e);
    document.getElementById('ch-list').innerHTML = `
      <div class="err-state">
        <p>Failed to load channels</p>
        <button onclick="loadChannels()">↺ Retry</button>
      </div>`;
    hideLoading();
    toast('Failed to load channels', 'err');
  }
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.style.transition = 'opacity 0.5s';
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 500);
}

function buildCats() {
  const cats = ['All', ...new Set(allChannels.map(c => c.group_title).filter(Boolean))].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b));
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = cats.map(c =>
    `<button class="cat-btn${c==='All'?' active':''}" data-cat="${c}" onclick="selectCat(this)">${getCatEmoji(c)} ${c}</button>`
  ).join('');
}

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  filterChannels();
}

function filterChannels() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  filtered = allChannels.filter(ch =>
    (currentCat === 'All' || ch.group_title === currentCat) &&
    (!q || ch.channel_name?.toLowerCase().includes(q) || ch.group_title?.toLowerCase().includes(q))
  );
  document.getElementById('ch-count-label').textContent = filtered.length + ' CHANNELS';
  renderList();
}

function renderList() {
  const list = document.getElementById('ch-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="err-state"><p>No channels found</p></div>';
    return;
  }
  list.innerHTML = filtered.map(ch => `
    <div class="ch-item${ch.key===activeKey?' active':''}" onclick="playChannel('${ch.key}')">
      <div class="ch-logo-wrap">
        ${ch.tvg_logo
          ? `<img src="${ch.tvg_logo}" alt="${ch.channel_name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          : ''}
        <span class="ch-placeholder" style="${ch.tvg_logo?'display:none':'display:flex'}">${getCatEmoji(ch.group_title)}</span>
      </div>
      <div class="ch-info">
        <div class="ch-name-s">${ch.channel_name || 'Channel ' + ch.key}</div>
        <div class="ch-cat-s">${ch.group_title || 'General'}</div>
      </div>
      <span class="ch-live-badge">LIVE</span>
    </div>
  `).join('');
}

// ── Play channel ──
async function playChannel(key) {
  if (activeKey === key) return;
  activeKey = key;
  const ch = allChannels.find(c => c.key === key);
  if (!ch) return;

  // Update UI
  renderList();
  document.getElementById('no-sel').style.display = 'none';
  document.getElementById('player-wrapper').style.display = 'flex';
  document.getElementById('player-wrapper').style.flexDirection = 'column';

  // Update info
  const npLogo = document.getElementById('np-logo');
  npLogo.innerHTML = ch.tvg_logo
    ? `<img src="${ch.tvg_logo}" alt="${ch.channel_name}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;">`
    : getCatEmoji(ch.group_title);
  document.getElementById('np-name').textContent = ch.channel_name || 'Channel ' + key;
  document.getElementById('np-cat').textContent = ch.group_title || 'General';
  document.getElementById('info-num').textContent = key;
  document.getElementById('info-name').textContent = ch.channel_name || 'Channel ' + key;
  document.getElementById('info-cat').textContent = ch.group_title || 'General';
  document.getElementById('info-grp').textContent = ch.group_title || 'General';

  // Reset player UI
  document.getElementById('errorBox').style.display = 'none';
  const overlay = document.getElementById('playOverlay');
  overlay.classList.remove('fade-out');
  overlay.style.display = 'flex';
  document.getElementById('loadRing').style.display = 'block';
  document.getElementById('playBtn').style.display = 'none';
  document.getElementById('overlayLabel').textContent = 'Loading stream…';
  streamReady = false;

  await initShaka(ch);
}

async function initShaka(ch) {
  const video = document.getElementById('video-el');
  const container = document.getElementById('shaka-container');

  // Destroy previous player
  if (shakaPlayer) {
    try { await shakaPlayer.destroy(); } catch(e) {}
    shakaPlayer = null;
  }

  if (!shaka.Player.isBrowserSupported()) {
    showError('Browser not supported');
    return;
  }

  shakaPlayer = new shaka.Player(video);
  const ui = new shaka.ui.Overlay(shakaPlayer, container, video);
  ui.configure({
    controlPanelElements: [
      'play_pause','time_and_duration','mute','volume','spacer',
      'captions','quality','language','picture_in_picture','fullscreen','overflow_menu'
    ]
  });

  // DRM
  if (ch.kid && ch.key) {
    shakaPlayer.configure({ drm: { clearKeys: { [ch.kid]: ch.key } } });
  }

  // Network
  shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers['Referer'] = 'https://www.jiotv.com/';
    request.headers['User-Agent'] = ch.user_agent || 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
  });

  shakaPlayer.configure({
    streaming: {
      lowLatencyMode: true, bufferingGoal: 15, rebufferingGoal: 2, bufferBehind: 15,
      retryParameters: { timeout: 10000, maxAttempts: 5, baseDelay: 300, backoffFactor: 1.2 },
      segmentRequestTimeout: 8000, segmentPrefetchLimit: 2, useNativeHlsOnSafari: true
    },
    manifest: { retryParameters: { timeout: 8000, maxAttempts: 3 } }
  });

  shakaPlayer.addEventListener('error', e => {
    console.error('Shaka error:', e.detail);
    showError('Stream error. Try another channel.');
  });

  try {
    await shakaPlayer.load(ch.url);
    streamReady = true;
    try {
      video.muted = true;
      await video.play();
      dismissOverlay();
    } catch(_) {
      markReady();
    }
  } catch(err) {
    console.error('Load error:', err);
    showError('Failed to load this stream.');
  }
}

function markReady() {
  document.getElementById('loadRing').style.display = 'none';
  document.getElementById('playBtn').style.display = 'flex';
  document.getElementById('overlayLabel').textContent = 'Tap to Play';
}

function dismissOverlay() {
  document.getElementById('playOverlay').classList.add('fade-out');
}

function showError(msg) {
  const eb = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  eb.style.display = 'flex';
  document.getElementById('playOverlay').style.display = 'none';
}

const doPlay = async () => {
  if (!streamReady) return;
  const video = document.getElementById('video-el');
  try {
    video.muted = false; video.volume = 0.8;
    await video.play();
    dismissOverlay();
  } catch(e) {
    try { video.muted = true; await video.play(); dismissOverlay(); } catch(e2) {
      document.getElementById('overlayLabel').textContent = 'Tap again to play';
    }
  }
};

document.getElementById('playOverlay').addEventListener('click', doPlay);
document.getElementById('playOverlay').addEventListener('touchend', e => { e.preventDefault(); doPlay(); });

// Unlock sound on interaction
let soundUnlocked = false;
['click','touchstart','keydown'].forEach(ev =>
  document.addEventListener(ev, () => {
    const v = document.getElementById('video-el');
    if (!soundUnlocked && v.muted) { v.muted = false; soundUnlocked = true; }
  }, { once: true })
);

document.addEventListener('visibilitychange', () => {
  const v = document.getElementById('video-el');
  if (!document.hidden && v.paused && streamReady) v.play().catch(()=>{});
});

// ── Toast ──
function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast${type==='ok'?' t-ok':type==='err'?' t-err':''}`;
  t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Init ──
loadChannels();
</script>
</body>
</html>
