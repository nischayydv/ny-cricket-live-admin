<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NY Cricket Live — Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
    <style>
        :root {
            --bg:#000; --surface:#0a0a0a; --border:#1a1a1a; --border2:#222;
            --accent:#e8c547; --green:#22c55e; --red:#ef4444; --text:#f0f0f0;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow:hidden;}

        /* HEADER */
        header{position:sticky;top:0;z-index:100;height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
        .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
        .logo-img{height:46px;width:auto;object-fit:contain;}
        .logo-top{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--accent);}
        .logo-bot{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:5px;color:#444;}
        .hdr-right{display:flex;align-items:center;gap:10px;}
        .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
        .pill-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.28);color:#ff6b6b;}
        .live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1.3s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

        /* LAYOUT */
        .layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 64px);}

        /* SIDEBAR */
        .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
        .sidebar-top{padding:12px;border-bottom:1px solid var(--border);}
        .search-wrap input{width:100%;background:#0a0a0a;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);outline:none;}
        .ch-list{flex:1;overflow-y:auto;padding:10px;}
        .ch-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;text-decoration:none;color:inherit;margin-bottom:4px;border:1px solid transparent;}
        .ch-item:hover{background:rgba(255,255,255,0.05);}
        .ch-item.active{background:rgba(232,197,71,0.1);border-color:var(--accent);}
        .ch-logo-wrap{width:40px;height:40px;background:#111;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
        .ch-logo-wrap img{width:100%;height:100%;object-fit:cover;}

        /* PLAYER AREA */
        .player-area{background:#000;display:flex;flex-direction:column;position:relative;}
        .shaka-video-container{width:100%;aspect-ratio:16/9;background:#000;}
        video{width:100%;height:100%;}
        .manual-play-button{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--accent);color:#000;padding:15px 25px;border-radius:8px;cursor:pointer;font-weight:bold;z-index:1000;display:none;}

        /* INFO BAR */
        .ch-info-bar{padding:15px 25px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:15px;}
        .info-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}

        /* LOADING SCREEN */
        #loading-screen{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
        .load-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--accent);}
        
        @media(max-width:860px){
            .layout{grid-template-columns:1fr;}
            .sidebar{height:300px;}
            body{overflow:auto;}
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="load-text">NY CRICKET LIVE</div>
    <p style="font-size:12px; color:#444;">Connecting to stream...</p>
</div>

<header>
    <a class="logo" href="#">
        <div class="logo-words">
            <div class="logo-top">NY CRICKET</div>
            <div class="logo-bot">LIVE STREAMING</div>
        </div>
    </a>
    <div class="hdr-right">
        <div class="pill pill-red"><div class="live-dot"></div>LIVE</div>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="search-wrap">
                <input type="text" id="search-inp" placeholder="Search channels..." oninput="filterChannels()">
            </div>
        </div>
        <div class="ch-list" id="ch-list">
            <p style="padding:20px; color:#444;">Loading list...</p>
        </div>
    </aside>

    <main class="player-area">
        <div id="shaka-container" style="width:100%; height:auto;">
            <video id="video-el" autoplay playsinline></video>
            <div class="manual-play-button" id="manualPlayButton">CLICK TO UNMUTE & PLAY</div>
        </div>
        <div class="ch-info-bar">
            <div class="info-name" id="info-name">Select a Channel</div>
        </div>
    </main>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/nischayydv/jiojson/main/stream.json';
    let allChannels = [], shakaPlayer = null, ui = null;

    // 1. Initialize Application
    async function initApp() {
        try {
            const res = await fetch(JSON_URL);
            const data = await res.json();
            // Convert Object to Array and ensure keys are clean
            allChannels = Object.entries(data).map(([key, ch]) => ({ 
                key: key.trim(), 
                ...ch 
            }));
            
            renderList(allChannels);
            hideLoading();

            // Check URL for ID
            const urlParams = new URLSearchParams(window.location.search);
            const requestedId = urlParams.get('id');
            if (requestedId) {
                playChannel(requestedId);
            }
        } catch (e) {
            console.error("Failed to load JSON", e);
            document.getElementById('ch-list').innerHTML = "<p style='padding:20px;'>Error loading data.</p>";
        }
    }

    function hideLoading() {
        const loader = document.getElementById('loading-screen');
        if (loader) loader.style.display = 'none';
    }

    function renderList(channels) {
        const list = document.getElementById('ch-list');
        list.innerHTML = channels.map(ch => `
            <a class="ch-item" href="javascript:void(0)" onclick="playChannel('${ch.key}')" id="ch-${ch.key}">
                <div class="ch-logo-wrap">
                    <img src="${ch.tvg_logo || ''}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                </div>
                <div>
                    <div style="font-size:13px; font-weight:600;">${ch.channel_name}</div>
                    <div style="font-size:10px; color:#555;">${ch.group_title || 'General'}</div>
                </div>
            </a>
        `).join('');
    }

    function filterChannels() {
        const q = document.getElementById('search-inp').value.toLowerCase();
        const filtered = allChannels.filter(c => c.channel_name.toLowerCase().includes(q));
        renderList(filtered);
    }

    async function playChannel(key) {
        const ch = allChannels.find(c => c.key === key);
        if (!ch) return;

        // UI Updates
        document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`ch-${key}`);
        if(activeItem) activeItem.classList.add('active');
        document.getElementById('info-name').textContent = ch.channel_name;

        await setupPlayer(ch);
    }

    async function setupPlayer(ch) {
        const video = document.getElementById('video-el');
        const container = document.getElementById('shaka-container');
        const playBtn = document.getElementById('manualPlayButton');

        // Cleanup
        if (ui) { await ui.destroy(); ui = null; }
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }

        shakaPlayer = new shaka.Player(video);
        ui = new shaka.ui.Overlay(shakaPlayer, container, video);
        
        // Configuration
        shakaPlayer.configure({
            streaming: { lowLatencyMode: true },
            drm: {
                clearKeys: (ch.kid && ch.key) ? { [ch.kid.trim()]: ch.key.trim() } : {}
            }
        });

        // Headers
        shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['User-Agent'] = ch.user_agent || 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36';
        });

        try {
            await shakaPlayer.load(ch.url);
            playBtn.style.display = 'none';
            
            // Try to play
            try {
                await video.play();
            } catch (e) {
                // If browser blocks, show play button
                playBtn.style.display = 'block';
                playBtn.onclick = () => {
                    video.muted = false;
                    video.play();
                    playBtn.style.display = 'none';
                };
            }
        } catch (err) {
            console.error("Playback Error", err);
            alert("Stream currently unavailable.");
        }
    }

    // Start App
    document.addEventListener('shaka-ui-loaded', initApp);
    // Fallback if event is missed
    setTimeout(() => { if(allChannels.length === 0) initApp(); }, 2000);
</script>

</body>
</html>
