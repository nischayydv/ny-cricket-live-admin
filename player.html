<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NY CRICKET LIVE</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --sidebar-width: 320px;
      --bg: #000;
      --surface: #0f0f0f;
      --accent: #ff0000;
      --text: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; height: 100vh; overflow: hidden; }

    /* LAYOUT SYSTEM */
    .app-container { display: flex; height: 100vh; width: 100vw; }

    /* SIDEBAR STYLES */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #222; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 2px; }
    .search-box { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; color: #fff; margin-top: 10px; outline: none; }
    .channel-list { flex: 1; overflow-y: auto; padding: 10px; }
    .ch-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
    .ch-item:hover { background: #222; }
    .ch-item.active { background: #333; border-left: 4px solid var(--accent); }
    .ch-logo { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; background: #000; }
    .ch-info { flex: 1; overflow: hidden; }
    .ch-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* PLAYER AREA STYLES */
    .player-main { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; }
    .shaka-video-container { width: 100%; aspect-ratio: 16/9; position: relative; }
    video { width: 100%; height: 100%; background: #000; }

    /* YouTube Theme Overrides */
    .youtube-theme .shaka-played-range { background: var(--accent) !important; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: var(--accent); }

    /* CLICK-TO-PLAY OVERLAY */
    #playOverlay {
      position: absolute; inset: 0; z-index: 3000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.8); cursor: pointer; transition: opacity 0.4s;
    }
    #playOverlay.hidden { opacity: 0; pointer-events: none; }
    .play-btn-circle { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
    .play-btn-circle i { font-size: 50px; color: white; margin-left: 5px; }
    .loading-ring { width: 60px; height: 60px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 768px) {
      .app-container { flex-direction: column; }
      .sidebar { width: 100%; height: 40%; border-right: none; border-top: 1px solid #222; }
      .player-main { height: 60%; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-text">NY CRICKET LIVE</div>
      <input type="text" class="search-box" id="searchInp" placeholder="Search Channels..." oninput="filterList()">
    </div>
    <div class="channel-list" id="chList">
      <div style="text-align:center; padding:20px; color:#666;">Fetching JSON...</div>
    </div>
  </aside>

  <main class="player-main">
    <div class="shaka-video-container youtube-theme" id="videoContainer">
      <video id="videoEl" playsinline></video>

      <div id="playOverlay" onclick="handleUserGesture()">
        <div id="statusIcon" class="loading-ring"></div>
        <div id="playLabel" style="margin-top:20px; font-weight:bold; letter-spacing:1px;">LOADING STREAM...</div>
      </div>
    </div>

    <div style="padding:20px; background:var(--surface);">
      <h2 id="currentName">Select a Channel</h2>
      <p id="currentGrp" style="color:#aaa; font-size:14px; margin-top:5px;">Ready to play</p>
    </div>
  </main>
</div>

<script>
  const JSON_URL = 'https://raw.githubusercontent.com/nischayydv/jiojson/main/stream.json';
  let allChannels = [], shakaPlayer = null, ui = null;
  let isReadyToPlay = false;

  // 1. INIT APP
  async function initApp() {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
      alert("Browser not supported!");
      return;
    }

    try {
      const res = await fetch(JSON_URL);
      const data = await res.json();
      allChannels = Object.entries(data).map(([key, ch]) => ({ key, ...ch }));
      renderList(allChannels);

      // Auto-load first channel if nothing selected
      if (allChannels.length > 0) loadChannel(allChannels[0].key);
    } catch (e) {
      document.getElementById('chList').innerHTML = `<div style="padding:20px; color:red;">Failed to load JSON</div>`;
    }
  }

  // 2. RENDER LIST
  function renderList(channels) {
    const list = document.getElementById('chList');
    list.innerHTML = channels.map(ch => `
      <div class="ch-item" onclick="loadChannel('${ch.key}')" id="item-${ch.key}">
        <img class="ch-logo" src="${ch.tvg_logo}" onerror="this.src='https://via.placeholder.com/45?text=TV'">
        <div class="ch-info">
          <div class="ch-name">${ch.channel_name}</div>
          <div style="font-size:11px; color:#777;">${ch.group_title || 'General'}</div>
        </div>
      </div>
    `).join('');
  }

  function filterList() {
    const q = document.getElementById('searchInp').value.toLowerCase();
    const filtered = allChannels.filter(c => c.channel_name.toLowerCase().includes(q));
    renderList(filtered);
  }

  // 3. LOAD CHANNEL INTO PLAYER
  async function loadChannel(key) {
    const ch = allChannels.find(c => c.key === key);
    if (!ch) return;

    // UI Updates
    document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active'));
    document.getElementById(`item-${key}`)?.classList.add('active');
    document.getElementById('currentName').textContent = ch.channel_name;
    document.getElementById('currentGrp').textContent = ch.group_title;

    // Reset Overlay
    const overlay = document.getElementById('playOverlay');
    const statusIcon = document.getElementById('statusIcon');
    const playLabel = document.getElementById('playLabel');
    overlay.classList.remove('hidden');
    statusIcon.className = 'loading-ring';
    playLabel.textContent = 'LOADING STREAM...';
    isReadyToPlay = false;

    // Initialize/Cleanup Player
    const video = document.getElementById('videoEl');
    const container = document.getElementById('videoContainer');

    if (ui) await ui.destroy();
    if (shakaPlayer) await shakaPlayer.destroy();

    shakaPlayer = new shaka.Player(video);
    ui = new shaka.ui.Overlay(shakaPlayer, container, video);
    ui.configure({ controlPanelElements: ['play_pause','time_and_duration','spacer','quality','fullscreen'] });

    // DRM & Proxy Setup
    shakaPlayer.configure({
      drm: { clearKeys: { [ch.kid.trim()]: ch.key.trim() } }
    });

    shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
      // PROXY: Mandatory to bypass 403 Forbidden on JioTV links
      const proxy = "https://corsproxy.io/?";
      request.uris[0] = proxy + encodeURIComponent(request.uris[0]);

      request.headers['Referer'] = 'https://www.jiotv.com/';
      request.headers['User-Agent'] = ch.user_agent || 'plaYtv/7.1.5 (Linux;Android 13)';
    });

    try {
      await shakaPlayer.load(ch.url);
      // Change Overlay to "Play" button
      statusIcon.className = 'play-btn-circle';
      statusIcon.innerHTML = '<i class="material-icons-sharp">play_arrow</i>';
      playLabel.textContent = 'TAP TO WATCH';
      isReadyToPlay = true;
    } catch (err) {
      playLabel.textContent = 'STREAM ERROR';
      console.error(err);
    }
  }

  // 4. USER GESTURE HANDLER
  function handleUserGesture() {
    if (!isReadyToPlay) return;
    const video = document.getElementById('videoEl');
    video.play();
    document.getElementById('playOverlay').classList.add('hidden');
  }

  document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
