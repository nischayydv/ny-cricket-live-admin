<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NY CRICKET LIVE</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    :root {
      --sidebar-width: 320px;
      --bg: #000;
      --surface: #0f0f0f;
      --accent: #ff0000;
      --text: #ffffff;
    }

    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .search-box {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      margin-top: 10px;
      outline: none;
    }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 5px;
    }

    .ch-item:hover {
      background: #222;
    }

    .ch-item.active {
      background: #333;
      border-left: 4px solid var(--accent);
    }

    .ch-logo {
      width: 45px;
      height: 45px;
      border-radius: 4px;
      object-fit: cover;
      background: #000;
      flex-shrink: 0;
    }

    .ch-info {
      flex: 1;
      overflow: hidden;
    }

    .ch-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }

    .ch-group {
      font-size: 11px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Player area */
    .player-main {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    /* YouTube Theme */
    .youtube-theme { font-family: 'Roboto', sans-serif; }
    .youtube-theme .shaka-bottom-controls {
      width: 100%; padding: 0; z-index: 1;
      display: flex; flex-direction: column;
    }
    .youtube-theme .shaka-ad-controls { order: 1; }
    .youtube-theme .shaka-controls-button-panel { order: 2; height: 40px; padding: 0 10px; }
    .youtube-theme .shaka-range-container { margin: 4px 10px; top: 0; }
    .youtube-theme .shaka-small-play-button { order: -3; }
    .youtube-theme .shaka-mute-button { order: -2; }
    .youtube-theme .shaka-controls-button-panel > * { margin: 0; padding: 3px 8px; color: #EEE; height: 40px; }
    .youtube-theme .shaka-controls-button-panel > *:focus { outline: none; box-shadow: inset 0 0 0 2px rgba(27,127,204,.8); color: #FFF; }
    .youtube-theme .shaka-controls-button-panel > *:hover { color: #FFF; }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container {
      position: relative; z-index: 10; left: -1px; order: -1;
      opacity: 0; width: 0; transition: width 0.2s cubic-bezier(0.4,0,1,1);
      height: 3px; padding: 0;
    }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:hover,
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:focus {
      display: block; width: 50px; opacity: 1; padding: 0 6px;
    }
    .youtube-theme .shaka-mute-button:hover + div { opacity: 1; width: 50px; padding: 0 6px; }
    .youtube-theme .shaka-current-time { padding: 0 10px; font-size: 12px; }
    .youtube-theme .shaka-seek-bar-container { height: 3px; position: relative; top: -1px; border-radius: 0; margin-bottom: 0; }
    .youtube-theme .shaka-seek-bar-container .shaka-range-element { opacity: 0; }
    .youtube-theme .shaka-seek-bar-container:hover { height: 5px; top: 0; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container:hover .shaka-range-element { opacity: 1; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: #FF0000; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-moz-range-thumb { background: #FF0000; cursor: pointer; }
    .youtube-theme .shaka-video-container * { font-family: 'Roboto', sans-serif; }
    .youtube-theme .shaka-video-container .material-icons-round { font-family: 'Material Icons Sharp'; }
    .youtube-theme .shaka-overflow-menu,
    .youtube-theme .shaka-settings-menu {
      border-radius: 2px; background: rgba(28,28,28,.9);
      transition: opacity 0.1s cubic-bezier(0,0,.2,1); user-select: none;
      right: 10px; bottom: 50px; padding: 8px 0; min-width: 200px;
    }
    .youtube-theme .shaka-settings-menu { padding: 0 0 8px 0; }
    .youtube-theme .shaka-settings-menu button { font-size: 12px; }
    .youtube-theme .shaka-settings-menu button span { margin-left: 33px; font-size: 13px; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] { display: flex; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] span { order: 2; margin-left: 0; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] i { order: 1; font-size: 18px; padding-left: 5px; }
    .youtube-theme .shaka-overflow-menu button { padding: 0; }
    .youtube-theme .shaka-overflow-menu button i { display: none; }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label {
      display: flex; justify-content: space-between; align-items: center;
      cursor: default; outline: none; height: 40px; flex: 0 0 100%;
    }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label span {
      flex-shrink: initial; padding-left: 15px; font-size: 13px; font-weight: 500; display: flex; align-items: center;
    }
    .youtube-theme .shaka-overflow-menu span + span {
      color: #FFF; font-weight: 400 !important; font-size: 12px !important;
      padding-right: 8px; padding-left: 0 !important;
    }
    .youtube-theme .shaka-overflow-menu span + span:after {
      content: "navigate_next"; font-family: 'Material Icons Sharp'; font-size: 20px;
    }
    .youtube-theme .shaka-overflow-menu .shaka-pip-button span + span { padding-right: 15px !important; }
    .youtube-theme .shaka-overflow-menu .shaka-pip-button span + span:after { content: ""; }
    .youtube-theme .shaka-back-to-overflow-button {
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.2);
      font-size: 12px; color: #eee; height: 40px;
    }
    .youtube-theme .shaka-back-to-overflow-button .material-icons-round { font-size: 15px; padding-right: 10px; }
    .youtube-theme .shaka-back-to-overflow-button span { margin-left: 3px !important; }
    .youtube-theme .shaka-overflow-menu button:hover,
    .youtube-theme .shaka-settings-menu button:hover { background-color: rgba(255,255,255,.1); cursor: pointer; }
    .youtube-theme .shaka-overflow-menu button:focus,
    .youtube-theme .shaka-settings-menu button:focus { background-color: rgba(255,255,255,.1); border: none; outline: none; }
    .youtube-theme .shaka-overflow-menu button,
    .youtube-theme .shaka-settings-menu button { color: #EEE; }
    .youtube-theme .shaka-captions-off { color: #BFBFBF; }
    .youtube-theme .shaka-overflow-menu-button { font-size: 18px; margin-right: 5px; }
    .youtube-theme .shaka-fullscreen-button:hover {
      font-size: 25px; transition: font-size 0.1s cubic-bezier(0,0,.2,1);
    }
    .youtube-theme .shaka-seek-bar { background: rgba(255,255,255,.2) !important; }
    .youtube-theme .shaka-buffered-range { background: rgba(255,255,255,.4) !important; }
    .youtube-theme .shaka-played-range { background: rgb(255,0,0) !important; }

    /* Hide Shaka spinner */
    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* Click-to-play overlay */
    #playOverlay {
      position: absolute;
      inset: 0;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      cursor: pointer;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
    }

    #playOverlay.fade-out {
      animation: fadeOut 0.4s ease forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    .ring {
      width: 54px;
      height: 54px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #playBtn {
      display: none;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 0 rgba(255,0,0,0.45);
      animation: pulse 2.2s infinite;
      transition: transform 0.15s ease;
    }

    #playBtn svg {
      width: 34px;
      height: 34px;
      margin-left: 6px;
      fill: #fff;
    }

    #playBtn:hover {
      transform: scale(1.1);
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,0,0,0.45); }
      70%  { box-shadow: 0 0 0 22px rgba(255,0,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
    }

    .overlay-label {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    #channelTitle {
      position: absolute;
      left: 10px;
      top: 10px;
      color: #fff;
      font-size: 14px;
      z-index: 1500;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      max-width: calc(100% - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #watermarkLogo {
      position: absolute;
      left: 10px;
      top: 62%;
      width: 60px;
      height: auto;
      opacity: 0.35;
      z-index: 1500;
      pointer-events: none;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
      transition: opacity 0.3s ease;
    }

    .shaka-video-container:hover #watermarkLogo {
      opacity: 0.5;
    }

    #errorBox {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 5000;
      background: #000;
      align-items: center;
      justify-content: center;
      color: #ff6666;
      font-size: 15px;
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40%;
        border-right: none;
        border-top: 1px solid #222;
        order: 2;
      }

      .player-main {
        flex: 1;
        order: 1;
      }
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-text">NY CRICKET LIVE</div>
      <input type="text" class="search-box" id="searchInp" placeholder="Search channels..." oninput="filterList()">
    </div>
    <div class="channel-list" id="chList">
      <div style="text-align:center; padding:20px; color:#666;">Fetching JSON...</div>
    </div>
  </aside>

  <main class="player-main">
    <div class="shaka-video-container youtube-theme" data-shaka-player>
      <video id="videoEl" playsinline preload="auto"
        poster="https://blogger.googleusercontent.com/img/a/AVvXsEiGqaZeRBZ6Y7yV5ZYSRiNRhBa5q9_EMx7R5TJcHd3XJwwHh2YhNOGt76Y4vEcUIjvIaA7W-Tw1RyMLP-4WZwVHA4mk18zwXl7HdSL5WabprIasDOWJO7jpL0zTQB4p_y7X0Rv0xwe-cJ-GvxofAgeRp2FIiNgB90n_b8Cqw0sAaZqVhJg_fi9UyfSO8KY">
      </video>

      <div id="playOverlay">
        <div class="ring" id="loadRing"></div>
        <div id="playBtn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
               </div>
        <div class="overlay-label" id="overlayLabel">Loading stream…</div>
      </div>

      <div id="channelTitle"></div>
      <img id="watermarkLogo"
        src="https://i.postimg.cc/J4m9Dz70/Gemini-Generated-Image-4zvnud4zvnud4zvn-Picsart-Background-Remover.png" alt="">
      <div id="errorBox"></div>
    </div>
  </main>
</div>

<script>
  const JSON_URL = 'channels.json';

  let allChannels = [];
  let player = null;
  let ui = null;
  let currentChannelId = null;
  let streamReady = false;

  const video = document.getElementById('videoEl');
  const container = document.querySelector('.shaka-video-container');
  const playOverlay = document.getElementById('playOverlay');
  const loadRing = document.getElementById('loadRing');
  const playBtn = document.getElementById('playBtn');
  const overlayLabel = document.getElementById('overlayLabel');
  const errorBox = document.getElementById('errorBox');
  const channelTitle = document.getElementById('channelTitle');
  const chList = document.getElementById('chList');

  const isInIframe = () => {
    try {
      return window.self !== window.top;
    } catch (_) {
      return true;
    }
  };

  const showError = (msg) => {
    errorBox.style.display = 'flex';
    errorBox.textContent = '⚠ ' + msg;
    playOverlay.style.display = 'none';
  };

  const showLoading = (msg = 'Loading stream…') => {
    errorBox.style.display = 'none';
    playOverlay.style.display = 'flex';
    playOverlay.classList.remove('fade-out');
    loadRing.style.display = 'block';
    playBtn.style.display = 'none';
    overlayLabel.textContent = msg;
    streamReady = false;
  };

  const markReady = () => {
    loadRing.style.display = 'none';
    playBtn.style.display = 'flex';
    overlayLabel.textContent = 'Tap to Play';
  };

  const dismissOverlay = () => {
    playOverlay.classList.add('fade-out');
  };

  const doPlay = async () => {
    if (!streamReady) return;

    try {
      video.muted = false;
      video.volume = 0.8;
      await video.play();
      dismissOverlay();
    } catch (e) {
      try {
        video.muted = true;
        await video.play();
        dismissOverlay();
        console.warn('Playing muted due to browser policy. User can unmute.');
      } catch (e2) {
        console.error('Play failed even muted:', e2);
        overlayLabel.textContent = 'Tap again to play';
      }
    }
  };

  playOverlay.addEventListener('click', doPlay);
  playOverlay.addEventListener('touchend', (e) => {
    e.preventDefault();
    doPlay();
  });

  video.addEventListener('play', () => {
    if (!isInIframe() && !document.fullscreenElement && window.innerWidth <= 768) {
      container.requestFullscreen().catch(() => {});
    }
  }, { once: true });

  let soundUnlocked = false;
  const unlockSound = () => {
    if (!soundUnlocked && video.muted) {
      video.muted = false;
      soundUnlocked = true;
    }
  };

  ['click', 'touchstart', 'keydown'].forEach(ev => {
    document.addEventListener(ev, unlockSound, { once: true });
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && video.paused && streamReady) {
      video.play().catch(() => {});
    }
  });

  window.addEventListener('message', async ({ data }) => {
    if (!data?.action) return;

    switch (data.action) {
      case 'play':
        doPlay();
        break;
      case 'pause':
        video.pause();
        break;
      case 'mute':
        video.muted = true;
        break;
      case 'unmute':
        video.muted = false;
        break;
      case 'volume':
        if (typeof data.value === 'number') {
          video.volume = Math.max(0, Math.min(1, data.value));
        }
        break;
      case 'loadChannel':
        if (data.id) {
          loadChannel(data.id);
        }
        break;
    }
  });

  function renderChannelList(channels) {
    if (!channels.length) {
      chList.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">No channels found</div>';
      return;
    }

    chList.innerHTML = channels.map(ch => `
      <div class="ch-item ${ch.id === currentChannelId ? 'active' : ''}" onclick="loadChannel('${ch.id}')" id="item-${ch.id}">
        <img class="ch-logo" src="${ch.tvg_logo || ''}" alt="${ch.channel_name || ''}"
             onerror="this.src='https://via.placeholder.com/45x45?text=TV'">
        <div class="ch-info">
          <div class="ch-name">${ch.channel_name || 'Unknown Channel'}</div>
          <div class="ch-group">${ch.group_title || 'General'}</div>
        </div>
      </div>
    `).join('');
  }

  function filterList() {
    const q = document.getElementById('searchInp').value.trim().toLowerCase();
    const filtered = allChannels.filter(ch =>
      (ch.channel_name || '').toLowerCase().includes(q) ||
      (ch.group_title || '').toLowerCase().includes(q)
    );
    renderChannelList(filtered);
  }

  async function destroyPlayer() {
    try {
      if (ui) {
        await ui.destroy();
        ui = null;
      }
    } catch (_) {}

    try {
      if (player) {
        await player.destroy();
        player = null;
      }
    } catch (_) {}
  }

  async function loadChannel(id) {
    const ch = allChannels.find(item => item.id === id);
    if (!ch) return;

    currentChannelId = id;
    renderChannelList(allChannels);
    channelTitle.textContent = ch.channel_name || '';

    showLoading('Loading stream…');

    await destroyPlayer();

    try {
      player = new shaka.Player(video);
      ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause',
          'time_and_duration',
          'mute',
          'volume',
          'spacer',
          'captions',
          'quality',
          'language',
          'picture_in_picture',
          'fullscreen',
          'overflow_menu'
        ]
      });

      if (ch.kid && ch.key) {
        player.configure({
          drm: {
            clearKeys: {
              [ch.kid.trim()]: ch.key.trim()
            }
          }
        });
      }

      const networkingEngine = player.getNetworkingEngine();
      if (networkingEngine) {
        networkingEngine.registerRequestFilter((type, request) => {
          request.headers['Referer'] = 'https://www.jiotv.com/';
          request.headers['User-Agent'] = ch.user_agent || 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

          if (ch.cookie) {
            request.headers['Cookie'] = ch.cookie;
          }
        });
      }

      player.configure({
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 10000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 8000,
          segmentPrefetchLimit: 2,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: {
            timeout: 8000,
            maxAttempts: 3
          }
        }
      });

      player.addEventListener('error', e => {
        console.error('Shaka error:', e.detail);
      });

      await player.load(ch.url);
      streamReady = true;

      try {
        video.muted = true;
        await video.play();
        console.log('Silent muted autoplay success');
        dismissOverlay();
      } catch (_) {
        markReady();
      }

    } catch (err) {
      console.error('Load error:', err);
      showError('Failed to load stream.');
    }
  }

  async function initApp() {
    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
      showError('Browser not supported');
      return;
    }

    try {
      const res = await fetch(JSON_URL);
      if (!res.ok) throw new Error('Failed to fetch JSON');

      const data = await res.json();

      allChannels = Object.entries(data).map(([id, ch]) => ({
        id,
        ...ch
      }));

      renderChannelList(allChannels);

      if (allChannels.length > 0) {
        loadChannel(allChannels[0].id);
      } else {
        showError('No channels found in JSON.');
      }
    } catch (err) {
      console.error('JSON load error:', err);
      chList.innerHTML = '<div style="text-align:center; padding:20px; color:#ff6666;">Failed to load channels</div>';
      showError('Failed to load channel list.');
    }
  }

  document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
